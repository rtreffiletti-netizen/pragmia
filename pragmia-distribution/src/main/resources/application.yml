spring:
  application:
    name: pragmia

  datasource:
    url: jdbc:postgresql://localhost:5432/pragmia
    username: pragmia
    password: pragmia_secret
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: >
      classpath:db/migration/virgilio,
      classpath:db/migration/canto,
      classpath:db/migration/clio,
      classpath:db/migration/beatrice,
      classpath:db/migration/minos,
      classpath:db/migration/luce
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: redis_secret
    ldap:
      urls: ldap://localhost:389
      base: dc=pragmia,dc=io
      username: cn=admin,dc=pragmia,dc=io
      password: ldap_secret

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/oauth2/jwks

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

pragmia:
  issuer-uri: http://localhost:8080
  virgilio:
    session:
      max-idle-minutes: 30
  beatrice:
    ollama:
      base-url: http://localhost:11434
      model: llama3.2
  luce:
    audit-retention-days: 365

logging:
  level:
    io.pragmia: DEBUG
    org.springframework.security: INFO
