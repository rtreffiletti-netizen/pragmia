apiVersion: apps/v1
kind: Deployment
metadata:
  name: pragmia
  labels:
    app: pragmia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pragmia
  template:
    metadata:
      labels:
        app: pragmia
    spec:
      containers:
      - name: pragmia
        image: pragmia:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
---
apiVersion: v1
kind: Service
metadata:
  name: pragmia
spec:
  type: ClusterIP
  selector:
    app: pragmia
  ports:
  - port: 80
    targetPort: 8080
